<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Предложение</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #ffe6e6;
    text-align: center;
    color: #333;
}

.container {
    margin-top: 100px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    transition: 0.3s;
}

.yes { background-color: #4CAF50; color: white; }
.no { background-color: #f44336; color: white; position: absolute; }
.hidden { display: none; }

.heart {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

.final-text {
    font-size: 48px;
    color: #ff4d6d;
    animation: fadeInText 1.5s ease forwards;
}

@keyframes fadeInText {
    0% { opacity: 0; transform: scale(0.8);}
    100% { opacity: 1; transform: scale(1);}
}
</style>
</head>
<body>

<div id="screen1" class="container">
    <h1>Сәлем 🙂</h1>
    <button onclick="next(2)">Сәлем </button>
</div>

<div id="screen2" class="container hidden">
    <h1>Саған бірдеңе айтайын деп едім... </h1>
    <button onclick="next(3)">Айта бер!</button>
</div>

<div id="screen3" class="container hidden">
    <h1>Қазір айтамын дайынсыңба?</h1>
    <button onclick="next(4)">Дайынмын!</button>
</div>

<div id="screen4" class="container hidden">
    <h1>ТОЧНО ?</h1>
    <button onclick="next(5)">Да</button>
</div>

<div id="screen5" class="container hidden">
    <h1>Күте тұр...</h1>
</div>

<div id="screen6" class="container hidden">
    <h1>Айта берейінба? 😅</h1>
    <button onclick="next(7)">Тезірек!!!</button>
</div>

<div id="screen7" class="container hidden">
    <h1>ЖАРАЙДЫ...</h1>
</div>

<div id="screen8" class="container hidden">
    <center>
        <img src="happy.gif">
    </center>
    <h1>НҰРАЙ СЕНІМЕН  БІРГЕ  ВАЛЬС  БИЛЕУГЕ  БОЛАДЫМА?</h1>
    <button class="yes" onclick="yes()">Иә ❤️</button>
    <button class="no" id="noBtn">Жоқ 💔</button>
</div>

<script>
function next(screen) {
    document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
    document.getElementById('screen' + screen).classList.remove('hidden');

    if (screen === 5) setTimeout(() => next(6), 1500);
    if (screen === 7) setTimeout(() => next(8), 1500);
}

function yes() {
    document.body.innerHTML = `
        <div id="final-text">
            <p>Мен өте қуаныштымын, сен қалай жауап берсеңде ❤️</p>
            <p>Бірақ бұл сайттағы жауабың маған көрінбейді✨</p>
            <p>Сол себепті егер келіссең WHATSAPP-қа келісемін деп жазшы</p>
            <p>Ал келіспесең просто ИГНОРИРУЙ</p>
        </div>
    `;
    for (let i = 0; i < 40; i++) createHeart();
}

const noBtn = document.getElementById("noBtn");
if (noBtn) {
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4500);
}
</script>

</body>
</html>
